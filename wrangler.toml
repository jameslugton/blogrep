name = "blogrep"
type = "javascript"
compatibility_date = "2024-04-01"

# Build configuration for Cloudflare Pages
[env.production]
routes = [
  { pattern = "*.html", zone_name = "example.com" },
  { pattern = "*.css", zone_name = "example.com" },
  { pattern = "*.js", zone_name = "example.com" },
]

[build]
command = "npm run build"
cwd = "."
